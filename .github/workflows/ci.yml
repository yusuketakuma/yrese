name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

      - name: Check OpenAPI generation drift
        run: pnpm check:openapi

      - name: Check secrets
        run: pnpm check:secrets

      - name: Check dependency vulnerabilities
        run: pnpm check:deps

      - name: Check SBOM
        run: pnpm check:sbom

      - name: Check boundaries
        run: pnpm check:boundaries

      - name: Check calculation purity
        run: pnpm check:calculation-purity

      - name: Check SSOT index
        run: pnpm check:ssot-index
